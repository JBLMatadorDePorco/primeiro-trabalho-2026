<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moto Expert - Peças e Acessórios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>MOTO <span>EXPERT</span></h1>
        <p>As melhores peças para sua máquina</p>
    </header>

    <main class="container">
        <div class="card">
            <img src="image 1.png" alt="Escapamento Esportivo">
            <div class="content">
                <h3>CB 250F TWISTER</h3>
                <p>equílibro e agilidade em uma só moto</p>
                <span class="preco">R$ 22.200,00</span>
                <button>Comprar</button>
            </div>
        </div>

        <div class="card">
            <img src="screenshot_4-trbd69uhji 1.png" alt="Capacete Carbono">
            <div class="content">
                <h3>Capacete Carbono</h3>
                <p>Leveza e segurança máxima nas pistas.</p>
                <span class="preco">R$ 850,00</span>
                <button>Comprar</button>
            </div>
        </div>

        <div class="card">
            <img src="images (2) 1.png" alt="Pneu Traseiro">
            <div class="content">
                <h3>Pneu Michelin Road 5</h3>
                <p>Aderência superior em solo molhado.</p>
                <span class="preco">R$ 980,00</span>
                <button>Comprar</button>
            </div>
        </div>
    </main>

</body>
</html>
